<VirtualHost *:80>
    ServerName localhost

    DocumentRoot /var/www/html/nodeapp
    DirectoryIndex index.html

    <Directory "/var/www/html/nodeapp">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.html [L]
    </Directory>

    ProxyPreserveHost On

    # /api/monitor/ elobb kell mint /api/ (specifikusabb utvonal elore)

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/api/monitor/(.*) ws://127.0.0.1:8000/$1 [P,L]

    <Location "/api/monitor/">
        ProxyPass http://127.0.0.1:8000/ timeout=3600
        ProxyPassReverse http://127.0.0.1:8000/
    </Location>

    <Location "/api/">
        ProxyPass http://127.0.0.1:8000/api/
        ProxyPassReverse http://127.0.0.1:8000/api/
    </Location>

</VirtualHost>